<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>3D Model Viewer</title>

    <!-- Model Viewer -->
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        text-align: center;
      }

      model-viewer {
        width: 100%;
        height: 90vh;
        background-color: #f5f5f5;
      }

      h1 {
        margin: 10px;
      }
    </style>
  </head>

  <body>
    <h1>My 3D Model</h1>

    <model-viewer
      src="BKaw.glb"
      ar
      ar-modes="webxr scene-viewer quick-look"
      camera-controls
      auto-rotate
      shadow-intensity="1"
      alt="3D model">
    </model-viewer>

  </body>
</html>
