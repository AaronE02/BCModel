<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Model Viewer</title>
    <script type="module">
        import { ModelViewerElement } from 'https://cdn.skypack.dev/@google/model-viewer';
        customElements.define('model-viewer', ModelViewerElement);
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
        }
        model-viewer {
            width: 80%;
            height: 80%;
            background-color: white;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <model-viewer 
        src="BKaw.glb"  
        alt="3D Model" 
        auto-rotate 
        camera-controls 
        ar 
        style="width: 100%; height: 100%">
    </model-viewer>
</body>
</html>
